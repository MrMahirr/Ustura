version: '3.8'

services:
  # ============================================================
  # PostgreSQL — Ana Veritabanı
  # ============================================================
  postgres:
    image: postgres:latest
    container_name: ustura_postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-ustura}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ustura_secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./ustura_backend/src/database/migrations/001_init_tables.sql:/docker-entrypoint-initdb.d/001_init_tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-ustura}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis — Slot Kilitleme & Cache
  # ============================================================
  redis:
    image: redis:latest
    container_name: ustura_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-ustura_redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ustura_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
